services:
  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    command: memcached -m 1024

  opds:
    build:
      context: ../
      dockerfile: opds.openlibrary.org/docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - MEMCACHE_HOST=memcached
      - MEMCACHE_PORT=11211
    ports:
      - "8080:8080"
    depends_on:
      - memcached
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
