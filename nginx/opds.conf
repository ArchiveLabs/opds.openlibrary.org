server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header Referrer-Policy         "no-referrer"     always;

    # Limit concurrent connections per IP
    limit_conn opds_conn 20;

    # --- Block internal/debug endpoints from reaching the app ---
    location = /sentry-debug {
        return 404;
    }
    location = /docs {
        return 404;
    }
    location = /redoc {
        return 404;
    }
    location = /openapi.json {
        return 404;
    }

    # --- Health check: no rate limit, no access log ---
    # Tighter timeouts than the default proxy_params — inline headers to avoid duplicates.
    location = /health {
        access_log off;
        proxy_pass             http://opds_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version     1.1;
        proxy_set_header Connection        "";
        proxy_connect_timeout  3s;
        proxy_read_timeout     5s;
    }

    # --- Search: stricter rate limit (hits OL Solr) ---
    location = /search {
        limit_req zone=opds_search burst=5 nodelay;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://opds_backend;
    }

    # --- Everything else ---
    location / {
        limit_req zone=opds_api burst=10 nodelay;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://opds_backend;
    }
}
