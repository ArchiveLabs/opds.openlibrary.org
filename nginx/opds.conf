server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header Referrer-Policy         "no-referrer"     always;

    # Limit concurrent connections per IP
    limit_conn opds_conn 20;

    # --- Block internal/debug endpoints from reaching the app ---
    location = /sentry-debug {
        return 404;
    }
    location = /docs {
        return 404;
    }
    location = /redoc {
        return 404;
    }
    location = /openapi.json {
        return 404;
    }

    # --- Health check: no rate limit, no access log ---
    location = /health {
        access_log off;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass            http://opds_backend;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
    }

    # --- Search: stricter rate limit (hits OL Solr) ---
    location = /search {
        limit_req zone=opds_search burst=5 nodelay;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://opds_backend;
    }

    # --- Everything else ---
    location / {
        limit_req zone=opds_api burst=10 nodelay;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_pass http://opds_backend;
    }
}
