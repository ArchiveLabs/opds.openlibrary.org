# General API: 30 req/min per IP
limit_req_zone $binary_remote_addr zone=opds_api:10m    rate=30r/m;

# Search: 10 req/min per IP — more expensive, hits OL Solr
limit_req_zone $binary_remote_addr zone=opds_search:10m rate=10r/m;

# Max concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=opds_conn:10m;

limit_req_status  429;
limit_conn_status 429;
